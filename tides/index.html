// ============================================================
const Sep = () => <div className="w-px h-6 mx-0.5" style={{ backgroundColor: "#8b6f47" }} />;

function ToolbarBtn({ active, disabled, onClick, icon: Icon, label, title: titleProp }) {
  return (
    <button onClick={disabled ? undefined : onClick} disabled={disabled}
            title={titleProp || label}
            className="flex items-center gap-1.5 px-2 py-1.5 rounded text-xs uppercase tracking-wider"
            style={{ color: disabled ? "#5c4030" : (active ? "#2a1810" : "#f4e8d0"), backgroundColor: active ? "#e8d4a8" : "transparent", opacity: disabled ? 0.35 : 1, fontFamily: "'IM Fell English SC', serif", cursor: disabled ? "default" : "pointer" }}>
      <Icon size={14} />
      {label && <span className="hidden sm:inline">{label}</span>}
    </button>
  );
}

function UploadGate({ onPickFile, onDropFile, error }) {
  const [dragOver, setDragOver] = useState(false);
  return (
    <div className="absolute inset-0 flex items-center justify-center p-8"
         onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
         onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(false); }}
         onDrop={(e) => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files?.[0]; if (f) onDropFile(f); }}>
      <div className="max-w-md w-full text-center px-8 py-10 rounded relative"
           style={{ backgroundColor: "rgba(244, 232, 208, 0.92)", border: dragOver ? "2px dashed #8b6f47" : "2px solid #5c4030", boxShadow: dragOver ? "0 0 0 4px rgba(139,111,71,0.25), 0 12px 40px rgba(42,24,16,0.3)" : "0 12px 40px rgba(42,24,16,0.3), inset 0 0 60px rgba(184,134,11,0.08)", transform: dragOver ? "scale(1.02)" : "scale(1)", transition: "transform 0.15s, box-shadow 0.15s" }}>
        {["top-1 left-1", "top-1 right-1 rotate-90", "bottom-1 right-1 rotate-180", "bottom-1 left-1 -rotate-90"].map((pos, i) => (
          <div key={i} className={`absolute ${pos}`} style={{ color: "#5c4030" }}>
            <svg width="20" height="20" viewBox="0 0 20 20"><path d="M1 1 L10 1 M1 1 L1 10 M1 1 L7 7" fill="none" stroke="currentColor" strokeWidth="1" /></svg>
          </div>
        ))}
        <Compass size={48} className="mx-auto mb-3" style={{ color: "#5c4030" }} />
        <h2 style={{ fontFamily: "'IM Fell English SC', serif", fontSize: 28, letterSpacing: "0.04em" }}>Chart Awaits</h2>
        <p className="mt-2 mb-1" style={{ fontFamily: "'IM Fell English', serif", fontStyle: "italic", color: "#5c4030" }}>Drop a map image here, or</p>
        <button onClick={onPickFile}
                className="inline-flex items-center gap-2 cursor-pointer px-5 py-2.5 rounded mt-3"
                style={{ backgroundColor: "#2a1810", color: "#f4e8d0", fontFamily: "'IM Fell English SC', serif", letterSpacing: "0.06em", border: "1px solid #8b6f47" }}>
          <Upload size={16} /> Upload Chart
        </button>
        {error && (
          <div className="mt-4 px-3 py-2 text-sm rounded flex items-start gap-2" style={{ backgroundColor: "rgba(139, 26, 26, 0.12)", color: "#5c1a1a", border: "1px solid #8b1a1a" }}>
            <AlertTriangle size={16} className="flex-shrink-0 mt-0.5" /><span>{error}</span>
          </div>
        )}
      </div>
    </div>
  );
}

function EditPanel({ item, kind, onClose, onSave, onDelete, onStartMove }) {
  const [draft, setDraft] = useState({ ...item });
  const updateDraft = (patch) => setDraft(d => ({ ...d, ...patch }));
  return (
    <div className="absolute right-0 top-0 h-full w-full sm:w-96 sm:max-w-[90vw] z-30 shadow-2xl overflow-y-auto"
         style={{ backgroundColor: "rgba(244, 232, 208, 0.97)", borderLeft: "2px solid #5c4030", fontFamily: "'EB Garamond', serif", animation: "slideInPanel 0.25s cubic-bezier(0.16, 1, 0.3, 1)" }}>
      <div className="px-5 py-4 flex items-center justify-between border-b sticky top-0"
           style={{ borderColor: "#8b6f47", backgroundColor: "rgba(244, 232, 208, 0.98)", backdropFilter: "blur(4px)" }}>
        <h3 style={{ fontFamily: "'IM Fell English SC', serif", fontSize: 18, color: "#2a1810", letterSpacing: "0.04em" }}>
          {kind === "pin" ? "Pin Inscription" : kind === "city" ? "Settlement Record" : item.zoneKind === "faction" ? (item.type === "path" ? "Faction Route" : "Faction Territory") : (item.type === "path" ? "Coastline Decree" : "Hot Zone Decree")}
        </h3>
        <div className="flex items-center gap-1.5">
          {onStartMove && (
            <button onClick={onStartMove}
                    className="flex items-center gap-1.5 px-3 py-1.5 rounded text-xs"
                    style={{ backgroundColor: "rgba(42,24,16,0.12)", color: "#5c4030", border: "1px solid #8b6f47", fontFamily: "'IM Fell English SC', serif", letterSpacing: "0.05em" }}
                    title="Drag pin to new location">
              <GrabHand size={14} /> Move
            </button>
          )}
          <button onClick={() => onSave(draft)}
                  className="flex items-center gap-1.5 px-3 py-1.5 rounded text-xs"
                  style={{ backgroundColor: "#2a4a1a", color: "#c8f0a8", border: "1px solid #4a6741", fontFamily: "'IM Fell English SC', serif", letterSpacing: "0.05em" }}
                  title="Save changes">
            <Check size={14} /> Save
          </button>
          <button onClick={onClose} className="p-1.5 rounded hover:bg-black/10" title="Discard changes">
            <X size={18} style={{ color: "#5c4030" }} />
          </button>
        </div>
      </div>
      <div className="px-5 py-4 space-y-4">
        {kind === "pin" ? <PinEditor item={draft} onUpdate={updateDraft} /> : kind === "city" ? <CityEditor item={draft} onUpdate={updateDraft} /> : <ZoneEditor item={draft} onUpdate={updateDraft} />}
        <div className="pt-3 border-t" style={{ borderColor: "#8b6f47" }}>
          <button onClick={() => { if (confirm(`Remove this ${kind}?`)) onDelete(); }}
                  className="flex items-center gap-2 px-3 py-1.5 text-sm rounded"
                  style={{ color: "#8b1a1a", border: "1px solid #8b1a1a", backgroundColor: "transparent" }}>
            <Trash2 size={14} /> {kind === "pin" ? "Remove Pin" : kind === "city" ? "Remove Settlement" : "Remove Zone"}
          </button>
        </div>
      </div>
    </div>
  );
}

const FieldLabel = ({ children }) => (
  <label className="block text-xs uppercase tracking-widest mb-1.5" style={{ fontFamily: "'IM Fell English SC', serif", color: "#5c4030", letterSpacing: "0.1em" }}>{children}</label>
);
const inputStyle = () => ({
  width: "100%", padding: "8px 10px",
  backgroundColor: "rgba(255, 250, 235, 0.7)",
  border: "1px solid #8b6f47", borderRadius: 2,
  fontFamily: "'EB Garamond', serif", fontSize: 15, color: "#2a1810", outline: "none",
});

function PinEditor({ item, onUpdate }) {
  const [customExpanded, setCustomExpanded] = useState(!item.customLabel);
  const customColor = item.customColor || "#7a5c3a";
  const customIconKey = item.customIconKey || "star";
  return (
    <>
      <div><FieldLabel>Title</FieldLabel><input value={item.title} onChange={(e) => onUpdate({ title: e.target.value })} style={inputStyle()} placeholder="What lies here?" /></div>
      <div>
        <FieldLabel>Type</FieldLabel>
        <div className="grid grid-cols-4 gap-1.5">
          {Object.entries(PIN_TYPES).map(([key, t]) => {
            const Icon = t.icon; const active = item.type === key;
            return (
              <button key={key} onClick={() => onUpdate({ type: key })}
                      className="flex flex-col items-center gap-1 py-2 rounded"
                      style={{ backgroundColor: active ? t.color : "rgba(255, 250, 235, 0.6)", color: active ? "#f4e8d0" : t.color, border: `1px solid ${active ? t.color : t.color + "55"}` }}>
                <Icon size={16} /><span className="text-[10px] uppercase tracking-wider">{t.label}</span>
              </button>
            );
          })}
          {/* Custom type tile */}
          <button onClick={() => onUpdate({ type: "custom", customLabel: item.customLabel || "Custom", customColor: customColor, customIconKey: customIconKey })}
                  className="flex flex-col items-center gap-1 py-2 rounded"
                  style={{ backgroundColor: item.type === "custom" ? customColor : "rgba(255, 250, 235, 0.6)", color: item.type === "custom" ? "#f4e8d0" : "#5c4030", border: `1px solid ${item.type === "custom" ? customColor : "#8b6f4755"}`, gridColumn: "span 1" }}>
            <Plus size={16} /><span className="text-[10px] uppercase tracking-wider">Custom</span>
          </button>
        </div>
      </div>

      {/* Custom pin definition fields */}
      {item.type === "custom" && (
        <div className="rounded" style={{ border: "1px solid #8b6f47" }}>
          <button onClick={() => setCustomExpanded(e => !e)}
                  className="w-full flex items-center justify-between px-3 py-2 text-xs"
                  style={{ fontFamily: "'IM Fell English SC', serif", color: "#5c4030", backgroundColor: "rgba(255,250,235,0.5)", borderRadius: customExpanded ? "2px 2px 0 0" : 2 }}>
            <span>Custom Style{item.customLabel ? ` · ${item.customLabel}` : ""}</span>
            <ChevronDown size={12} style={{ transform: customExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }} />
          </button>
        {customExpanded && <div className="space-y-3 p-3" style={{ backgroundColor: "rgba(255,250,235,0.5)", borderTop: "1px solid #8b6f4755" }}>
          <div>
            <FieldLabel>Custom Label</FieldLabel>
            <input value={item.customLabel || ""} onChange={(e) => onUpdate({ customLabel: e.target.value })} style={inputStyle()} placeholder="e.g. Volcano, Temple, Ruin…" />
          </div>
          <div>
            <FieldLabel>Colour</FieldLabel>
            <div className="flex items-center gap-3">
              <input type="color" value={customColor} onChange={(e) => onUpdate({ customColor: e.target.value })}
                     style={{ width: 36, height: 30, border: "1px solid #8b6f47", borderRadius: 2, cursor: "pointer", padding: 1, backgroundColor: "transparent" }} />
              <div className="flex gap-1.5 flex-wrap">
                {["#8b1a1a","#8b4513","#7a5c1a","#1a5c2a","#1a3a6b","#5c1a6b","#4a1a4a","#3a3a3a"].map(c => (
                  <button key={c} onClick={() => onUpdate({ customColor: c })}
                          style={{ width: 20, height: 20, backgroundColor: c, borderRadius: "50%", border: customColor === c ? "2px solid #2a1810" : "2px solid transparent", outline: customColor === c ? "2px solid " + c : "none" }} />
                ))}
              </div>
            </div>
          </div>
          <div>
            <FieldLabel>Icon</FieldLabel>
            <div className="grid grid-cols-8 gap-1">
              {Object.entries(CUSTOM_ICONS).map(([key, Ico]) => {
                const active = customIconKey === key;
                return (
                  <button key={key} onClick={() => onUpdate({ customIconKey: key })}
                          className="flex items-center justify-center rounded p-1.5"
                          style={{ backgroundColor: active ? customColor : "rgba(255,250,235,0.6)", color: active ? "#f4e8d0" : "#5c4030", border: `1px solid ${active ? customColor : "#8b6f4755"}` }}
                          title={key}>
                    <Ico size={14} />
                  </button>
                );
              })}
            </div>
          </div>
        </div>}
        </div>
      )}

      <div><FieldLabel>Notes</FieldLabel><textarea value={item.description} onChange={(e) => onUpdate({ description: e.target.value })} style={{ ...inputStyle(), minHeight: 140, resize: "vertical", lineHeight: 1.5 }} placeholder="The whispers say…" /></div>
    </>
  );
}

function ZoneEditor({ item, onUpdate }) {
  const isFaction = item.zoneKind === "faction";
  const factionColor = item.factionColor || "#6b1a8b";
  return (
    <>
      <div>
        <FieldLabel>{item.type === "path" ? (isFaction ? "Territory Route" : "Coastline Name") : (isFaction ? "Territory Name" : "Zone Name")}</FieldLabel>
        <input value={item.name} onChange={(e) => onUpdate({ name: e.target.value })} style={inputStyle()} placeholder="What is this region called?" />
      </div>

      {isFaction ? (
        <>
          <div>
            <FieldLabel>Faction / Group</FieldLabel>
            <div className="flex items-start gap-1.5 mb-1" style={{ fontFamily: "'IM Fell English', serif", fontStyle: "italic", fontSize: 12, color: "#5c4030" }}>
              <AlertTriangle size={12} style={{ flexShrink: 0, marginTop: 2 }} />
              Which group holds dominion here?
            </div>
            <input value={item.factionName || ""} onChange={(e) => onUpdate({ factionName: e.target.value })} style={inputStyle()} placeholder="e.g. The Iron Circle, Sea Princes…" />
          </div>
          <div>
            <FieldLabel>Faction Colour</FieldLabel>
            <div className="flex items-center gap-3">
              <input type="color" value={factionColor} onChange={(e) => onUpdate({ factionColor: e.target.value })}
                     style={{ width: 36, height: 30, border: "1px solid #8b6f47", borderRadius: 2, cursor: "pointer", padding: 1, backgroundColor: "transparent" }} />
              <div className="flex gap-1.5 flex-wrap">
                {FACTION_COLORS.map(c => (
                  <button key={c} onClick={() => onUpdate({ factionColor: c })}
                          style={{ width: 20, height: 20, backgroundColor: c, borderRadius: "50%", border: factionColor === c ? "2px solid #2a1810" : "2px solid transparent", outline: factionColor === c ? "2px solid " + c : "none" }} />
                ))}
              </div>
            </div>
          </div>
        </>
      ) : (
        <div>
          <FieldLabel>Danger Level</FieldLabel>
          <div className="flex items-start gap-1.5 mb-2" style={{ fontFamily: "'IM Fell English', serif", fontStyle: "italic", fontSize: 12, color: "#5c4030" }}>
            <AlertTriangle size={12} style={{ flexShrink: 0, marginTop: 2 }} />
            How perilous are conditions in this area?
          </div>
          <div className="grid grid-cols-5 gap-1">
            {Object.entries(DANGER_LEVELS).map(([key, d]) => {
              const active = item.dangerLevel === key;
              return (
                <button key={key} onClick={() => onUpdate({ dangerLevel: key })}
                        className="py-1.5 rounded text-xs uppercase tracking-wider"
                        style={{ backgroundColor: active ? d.stroke : "transparent", color: active ? "#f4e8d0" : d.stroke, border: `1px solid ${d.stroke}`, fontFamily: "'IM Fell English SC', serif", letterSpacing: "0.06em" }}>
                  {d.label}
                </button>
              );
            })}
          </div>
          {item.dangerLevel && <p className="mt-2 text-xs italic" style={{ color: "#5c4030" }}>{DANGER_LEVELS[item.dangerLevel]?.desc}</p>}
        </div>
      )}

      <div><FieldLabel>Description</FieldLabel><textarea value={item.description} onChange={(e) => onUpdate({ description: e.target.value })} style={{ ...inputStyle(), minHeight: 140, resize: "vertical", lineHeight: 1.5 }} placeholder={isFaction ? "Notes on this faction's presence…" : "What characterizes this region?"} /></div>
    </>
  );
}

function CityEditor({ item, onUpdate }) {
  return (
    <>
      <div><FieldLabel>Name</FieldLabel><input value={item.name} onChange={(e) => onUpdate({ name: e.target.value })} style={inputStyle()} placeholder="What is this settlement called?" /></div>

      <div>
        <FieldLabel>Size</FieldLabel>
        <div className="grid grid-cols-4 gap-1.5">
          {Object.entries(CITY_SIZES).map(([key, s]) => {
            const Icon = s.icon; const active = item.size === key;
            return (
              <button key={key} onClick={() => onUpdate({ size: key })}
                      className="flex flex-col items-center gap-1 py-2 rounded"
                      style={{ backgroundColor: active ? s.color : "rgba(255, 250, 235, 0.6)", color: active ? "#f4e8d0" : s.color, border: `1px solid ${active ? s.color : s.color + "55"}` }}>
                <Icon size={16} /><span className="text-[10px] uppercase tracking-wider">{s.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div><FieldLabel>Leader</FieldLabel><input value={item.leader || ""} onChange={(e) => onUpdate({ leader: e.target.value })} style={inputStyle()} placeholder="Who rules here?" /></div>

      <div><FieldLabel>Population</FieldLabel><input value={item.population || ""} onChange={(e) => onUpdate({ population: e.target.value })} style={inputStyle()} placeholder="e.g. ~12,000 or 'Sparse'" /></div>

      <div><FieldLabel>Economy</FieldLabel><textarea value={item.economy || ""} onChange={(e) => onUpdate({ economy: e.target.value })} style={{ ...inputStyle(), minHeight: 60, resize: "vertical", lineHeight: 1.5 }} placeholder="Trade, agriculture, mining…" /></div>

      <div>
        <FieldLabel>Factions Present</FieldLabel>
        {(item.factions || []).map((f, i) => (
          <div key={i} className="flex items-center gap-1.5 mb-1.5">
            <input value={f} onChange={(e) => { const factions = [...(item.factions || [])]; factions[i] = e.target.value; onUpdate({ factions }); }} style={inputStyle()} placeholder="Faction name…" />
            <button onClick={() => { const factions = (item.factions || []).filter((_, j) => j !== i); onUpdate({ factions }); }} className="p-1.5 rounded hover:bg-black/10 flex-shrink-0" style={{ color: "#8b1a1a" }}><X size={14} /></button>
          </div>
        ))}
        <button onClick={() => onUpdate({ factions: [...(item.factions || []), ""] })}
                className="flex items-center gap-1 text-xs mt-1 px-2 py-1 rounded hover:bg-black/5"
                style={{ color: "#5c4030", fontFamily: "'IM Fell English SC', serif" }}><Plus size={12} /> Add Faction</button>
      </div>

      <div>
        <FieldLabel>Districts</FieldLabel>
        {(item.districts || []).map((d, i) => (
          <div key={i} className="mb-2 p-2.5 rounded" style={{ backgroundColor: "rgba(255,250,235,0.5)", border: "1px solid #8b6f4755" }}>
            <div className="flex items-center gap-1.5 mb-1.5">
              <input value={d.name} onChange={(e) => { const districts = [...(item.districts || [])]; districts[i] = { ...districts[i], name: e.target.value }; onUpdate({ districts }); }}
                     style={{ ...inputStyle(), fontSize: 13, padding: "5px 8px", fontWeight: 600 }} placeholder="District name…" />
              <button onClick={() => { const districts = (item.districts || []).filter((_, j) => j !== i); onUpdate({ districts }); }}
                      className="p-1.5 rounded hover:bg-black/10 flex-shrink-0" style={{ color: "#8b1a1a" }}><X size={14} /></button>
            </div>
            <textarea value={d.description || ""} onChange={(e) => { const districts = [...(item.districts || [])]; districts[i] = { ...districts[i], description: e.target.value }; onUpdate({ districts }); }}
                      style={{ ...inputStyle(), fontSize: 13, padding: "5px 8px", minHeight: 50, resize: "vertical", lineHeight: 1.4 }} placeholder="What defines this district?" />
          </div>
        ))}
        <button onClick={() => onUpdate({ districts: [...(item.districts || []), { name: "", description: "" }] })}
                className="flex items-center gap-1 text-xs mt-1 px-2 py-1 rounded hover:bg-black/5"
                style={{ color: "#5c4030", fontFamily: "'IM Fell English SC', serif" }}><Plus size={12} /> Add District</button>
      </div>

      <div><FieldLabel>Notes</FieldLabel><textarea value={item.description || ""} onChange={(e) => onUpdate({ description: e.target.value })} style={{ ...inputStyle(), minHeight: 100, resize: "vertical", lineHeight: 1.5 }} placeholder="Lore, history, notable features…" /></div>
    </>
  );
}

function ZoneKindPicker({ shape, onPick, onDismiss }) {
  useEffect(() => {
    const handler = (e) => { onDismiss(); };
    const t = setTimeout(() => window.addEventListener("pointerdown", handler), 0);
    return () => { clearTimeout(t); window.removeEventListener("pointerdown", handler); };
  }, [onDismiss]);
  return (
    <div className="absolute top-16 left-1/2 -translate-x-1/2 z-30 rounded-sm shadow-2xl overflow-hidden"
         style={{ backgroundColor: "rgba(22,12,6,0.98)", border: "1px solid #8b6f47", minWidth: 260, animation: "toastPop 0.2s ease-out" }}
         onPointerDown={(e) => e.stopPropagation()}>
      <div className="px-4 py-2 border-b text-xs uppercase tracking-widest"
           style={{ color: "#a89070", borderColor: "#3a2010", fontFamily: "'IM Fell English SC', serif" }}>
        What kind of {shape === "circle" ? "zone" : "brush stroke"} are you drawing?
      </div>
      <button onClick={() => onPick("environmental")}
              className="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/8 text-left transition-colors">
        <div className="w-9 h-9 rounded flex items-center justify-center flex-shrink-0" style={{ backgroundColor: "rgba(139,26,26,0.25)", border: "1px solid #8b1a1a" }}>
          <AlertTriangle size={18} style={{ color: "#c93838" }} />
        </div>
        <div>
          <div style={{ fontFamily: "'IM Fell English SC', serif", color: "#f4e8d0", fontSize: 15 }}>Environmental</div>
          <div style={{ fontFamily: "'IM Fell English', serif", fontStyle: "italic", fontSize: 12, color: "#7a6050" }}>How dangerous is this terrain?</div>
        </div>
      </button>
      <button onClick={() => onPick("faction")}
              className="w-full flex items-center gap-3 px-4 py-3 hover:bg-white/8 text-left transition-colors border-t"
              style={{ borderColor: "#3a2010" }}>
        <div className="w-9 h-9 rounded flex items-center justify-center flex-shrink-0" style={{ backgroundColor: "rgba(147,51,234,0.2)", border: "1px solid #9333ea" }}>
          <Crown size={18} style={{ color: "#c084fc" }} />
        </div>
        <div>
          <div style={{ fontFamily: "'IM Fell English SC', serif", color: "#f4e8d0", fontSize: 15 }}>Faction</div>
          <div style={{ fontFamily: "'IM Fell English', serif", fontStyle: "italic", fontSize: 12, color: "#7a6050" }}>Which group holds dominion here?</div>
        </div>
      </button>
    </div>
  );
}

function ToastContainer({ toasts }) {
  if (!toasts.length) return null;
  return (
    <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className="flex items-center gap-2 px-4 py-2.5 rounded-sm shadow-xl"
             style={{ animation: "toastPop 0.3s cubic-bezier(0.16, 1, 0.3, 1)", backgroundColor: t.type === "error" ? "rgba(139,26,26,0.97)" : "rgba(28,16,8,0.95)", color: "#f4e8d0", border: t.type === "error" ? "1px solid #8b1a1a" : "1px solid #8b6f47", fontFamily: "'IM Fell English', serif", fontStyle: "italic", fontSize: 14, boxShadow: "0 4px 20px rgba(0,0,0,0.4)", whiteSpace: "nowrap" }}>
          {t.type === "error" ? <AlertTriangle size={13} style={{ flexShrink: 0 }} /> : <Check size={13} style={{ flexShrink: 0 }} />}
          {t.message}
        </div>
      ))}
    </div>
  );
}

function FilterPanel({ hiddenTypes, hiddenZoneKinds, hiddenCitySizes, onToggleType, onToggleZoneKind, onToggleCitySize }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const close = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    const t = setTimeout(() => document.addEventListener("mousedown", close), 0);
    return () => { clearTimeout(t); document.removeEventListener("mousedown", close); };
  }, [open]);
  const activeCount = hiddenTypes.size + hiddenZoneKinds.size + hiddenCitySizes.size;
  return (
    <div ref={ref} className="relative" style={{ pointerEvents: "auto" }}>
      <button onClick={() => setOpen(o => !o)}
              className="flex items-center gap-1.5 px-2.5 py-1.5 rounded text-xs uppercase tracking-wider"
              style={{ backgroundColor: "rgba(42,24,16,0.93)", color: "#f4e8d0", border: `1px solid ${activeCount > 0 ? "#c4641e" : "#8b6f47"}`, fontFamily: "'IM Fell English SC', serif", letterSpacing: "0.06em" }}>
        <Eye size={13} />
        <span>Filters</span>
        {activeCount > 0 && (
          <span style={{ backgroundColor: "#c4641e", borderRadius: "50%", width: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontFamily: "sans-serif", flexShrink: 0 }}>{activeCount}</span>
        )}
      </button>
      {open && (
        <div className="absolute bottom-full right-0 mb-2 rounded-sm shadow-2xl overflow-hidden"
             style={{ backgroundColor: "rgba(22,12,6,0.97)", border: "1px solid #8b6f47", minWidth: 190, animation: "toastPop 0.2s ease-out" }}>
          <div className="px-3 py-1.5 border-b text-xs uppercase tracking-widest"
               style={{ borderColor: "#3a2010", color: "#a89070", fontFamily: "'IM Fell English SC', serif" }}>Pins</div>
          {Object.entries(PIN_TYPES).map(([key, t]) => {
            const Icon = t.icon; const hidden = hiddenTypes.has(key);
            return (
              <button key={key} onClick={() => onToggleType(key)}
                      className="w-full flex items-center gap-2 px-3 py-1.5 text-left"
                      style={{ opacity: hidden ? 0.42 : 1, backgroundColor: "transparent", transition: "opacity 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.backgroundColor = "rgba(255,255,255,0.07)"}
                      onMouseLeave={e => e.currentTarget.style.backgroundColor = "transparent"}>
                <Icon size={11} style={{ color: t.color, flexShrink: 0 }} />
                <span style={{ fontSize: 12, color: "#f4e8d0", flex: 1, fontFamily: "'IM Fell English SC', serif" }}>{t.label}</span>
                <div style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: hidden ? "transparent" : t.color, border: `1.5px solid ${t.color}`, flexShrink: 0, transition: "background-color 0.15s" }} />
              </button>
            );
          })}
          {(() => { const hidden = hiddenTypes.has("custom"); return (
            <button onClick={() => onToggleType("custom")}
                    className="w-full flex items-center gap-2 px-3 py-1.5 text-left"
                    style={{ opacity: hidden ? 0.42 : 1, backgroundColor: "transparent", transition: "opacity 0.15s" }}
                    onMouseEnter={e => e.currentTarget.style.backgroundColor = "rgba(255,255,255,0.07)"}
                    onMouseLeave={e => e.currentTarget.style.backgroundColor = "transparent"}>
              <Plus size={11} style={{ color: "#8b6f47", flexShrink: 0 }} />
              <span style={{ fontSize: 12, color: "#f4e8d0", flex: 1, fontFamily: "'IM Fell English SC', serif" }}>Custom</span>
              <div style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: hidden ? "transparent" : "#8b6f47", border: "1.5px solid #8b6f47", flexShrink: 0, transition: "background-color 0.15s" }} />
            </button>
          ); })()}
          <div className="px-3 py-1.5 border-t border-b text-xs uppercase tracking-widest"
               style={{ borderColor: "#3a2010", color: "#a89070", fontFamily: "'IM Fell English SC', serif" }}>Hot Zones</div>
          {[
            { key: "environmental", label: "Environmental", icon: AlertTriangle, color: "#c4641e" },
            { key: "faction",       label: "Faction",       icon: Crown,         color: "#9333ea" },
          ].map(({ key, label, icon: Icon, color }) => {
            const hidden = hiddenZoneKinds.has(key);
            return (
              <button key={key} onClick={() => onToggleZoneKind(key)}
                      className="w-full flex items-center gap-2 px-3 py-1.5 text-left"
                      style={{ opacity: hidden ? 0.42 : 1, backgroundColor: "transparent", transition: "opacity 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.backgroundColor = "rgba(255,255,255,0.07)"}
                      onMouseLeave={e => e.currentTarget.style.backgroundColor = "transparent"}>
                <Icon size={11} style={{ color, flexShrink: 0 }} />
                <span style={{ fontSize: 12, color: "#f4e8d0", flex: 1, fontFamily: "'IM Fell English SC', serif" }}>{label}</span>
                <div style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: hidden ? "transparent" : color, border: `1.5px solid ${color}`, flexShrink: 0, transition: "background-color 0.15s" }} />
              </button>
            );
          })}
          <div className="px-3 py-1.5 border-t border-b text-xs uppercase tracking-widest"
               style={{ borderColor: "#3a2010", color: "#a89070", fontFamily: "'IM Fell English SC', serif" }}>Settlements</div>
          {Object.entries(CITY_SIZES).map(([key, s]) => {
            const Icon = s.icon; const hidden = hiddenCitySizes.has(key);
            return (
              <button key={key} onClick={() => onToggleCitySize(key)}
                      className="w-full flex items-center gap-2 px-3 py-1.5 text-left"
                      style={{ opacity: hidden ? 0.42 : 1, backgroundColor: "transparent", transition: "opacity 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.backgroundColor = "rgba(255,255,255,0.07)"}
                      onMouseLeave={e => e.currentTarget.style.backgroundColor = "transparent"}>
                <Icon size={11} style={{ color: s.color, flexShrink: 0 }} />
                <span style={{ fontSize: 12, color: "#f4e8d0", flex: 1, fontFamily: "'IM Fell English SC', serif" }}>{s.label}</span>
                <div style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: hidden ? "transparent" : s.color, border: `1.5px solid ${s.color}`, flexShrink: 0, transition: "background-color 0.15s" }} />
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

      <circle cx="50" cy="50" r="42" fill="none" stroke="#2a1810" strokeWidth="0.4" />
      <g stroke="#2a1810" strokeWidth="0.5" fill="#5c4030">
        <polygon points="50,5 53,50 50,55 47,50" fill="#2a1810" />
        <polygon points="50,95 53,50 50,45 47,50" />
        <polygon points="5,50 50,53 55,50 50,47" />
        <polygon points="95,50 50,53 45,50 50,47" />
      </g>
      <g stroke="#2a1810" strokeWidth="0.3" fill="#8b6f47" opacity="0.7">
        <polygon points="50,15 52,50 50,52 48,50" />
        <polygon points="50,85 52,50 50,48 48,50" />
        <polygon points="15,50 50,52 52,50 50,48" />
        <polygon points="85,50 50,52 48,50 50,48" />
      </g>
      <circle cx="50" cy="50" r="3" fill="#2a1810" />
      <text x="50" y="12" textAnchor="middle" fontSize="7" fill="#2a1810" fontFamily="serif" fontWeight="bold">N</text>
      <text x="50" y="93" textAnchor="middle" fontSize="6" fill="#2a1810" fontFamily="serif">S</text>
      <text x="93" y="53" textAnchor="middle" fontSize="6" fill="#2a1810" fontFamily="serif">E</text>
      <text x="7"  y="53" textAnchor="middle" fontSize="6" fill="#2a1810" fontFamily="serif">W</text>

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
